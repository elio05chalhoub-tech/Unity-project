<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Visualiseur 360° - AI World</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <style>
        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
        }

        #ui-overlay {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            padding: 10px 20px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            font-family: sans-serif;
            color: white;
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .btn {
            background: linear-gradient(135deg, #ff7e5f, #feb47b);
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            text-decoration: none;
        }
    </style>
</head>

<body>
    <div id="ui-overlay">
        <span>Glissez pour regarder autour</span>
        <button class="btn" onclick="document.querySelector('a-scene').enterVR()">VR</button>
        <button class="btn" onclick="window.close()" style="background: rgba(255,255,255,0.2);">Fermer</button>
    </div>

    <!-- The A-Frame Scene -->
    <a-scene vr-mode-ui="enabled: false">
        <!-- The image is dynamically loaded here -->
        <a-sky id="skybox" src="" rotation="0 -90 0"></a-sky>
        <!-- Camera specialized for mobile and desktop dragging -->
        <a-entity camera
            look-controls="reverseMouseDrag: true, touchEnabled: true, magicWindowTrackingEnabled: true"></a-entity>
    </a-scene>

    <script>
        // Get the image URL from the query string (?image=...)
        const urlParams = new URLSearchParams(window.location.search);
        const imageUrl = urlParams.get('image');

        if (imageUrl) {
            document.getElementById('skybox').setAttribute('src', imageUrl);
        } else {
            alert("Aucune image spécifiée.");
        }
    </script>
</body>

</html>
